<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>рҹҷҸ бһҹбҹҶбһҺбһјбһҳбһ–бһҡбһҸбҹ’бһҡбҹҖбһҳбһ”бҹ’бһҡбһЎбһ„</title>
<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&family=Moul&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0a;
    --accent: #ffffff;
    --glass: rgba(255, 255, 255, 0.07);
    --border: rgba(255, 255, 255, 0.15);
    --text-main: #f0f0f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-color: var(--bg);
    color: var(--text-main);
    /* Fix for iPhone/Safari Khmer Rendering */
    font-family: 'Kantumruy Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 90%;
    max-width: 500px;
    text-align: center;
  }

  .main-title {
    font-family: 'Moul', serif;
    font-size: 1.6rem;
    margin-bottom: 2.5rem;
    line-height: 1.8;
    color: #ffffff;
  }

  .btn-primary {
    background: #ffffff;
    color: #000000;
    border: none;
    padding: 1.2rem 2.8rem;
    font-size: 1.3rem;
    font-family: 'Kantumruy Pro', sans-serif;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(255,255,255,0.1);
  }

  #screen-msg {
    display: none;
    flex-direction: column;
    align-items: center;
  }

  #screen-msg.active { 
    display: flex; 
    animation: slideUp 0.6s ease-out forwards; 
  }

  .msg-card {
    background: var(--glass);
    border: 1px solid var(--border);
    padding: 2rem;
    border-radius: 28px;
    line-height: 2.3; /* Increased for Khmer subscripts */
    font-size: 1.2rem;
    text-align: left;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    word-wrap: break-word;
  }

  /* Fixed Typing Effect for Khmer */
  .khmer-msg {
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .khmer-msg.visible {
    opacity: 1;
  }

  .back-btn {
    margin-top: 2rem;
    background: transparent;
    border: none;
    color: #888;
    font-size: 1rem;
    text-decoration: underline;
  }

  @keyframes slideUp { 
    from { opacity: 0; transform: translateY(20px); } 
    to { opacity: 1; transform: translateY(0); } 
  }
</style>
</head>
<body>

<div id="app">
  <div id="screen-start">
    <h1 class="main-title">бһӣбҹ„бһҖбһӮбҹ’бһҡбһјбһҮбһ¶бһ‘бһёбһӮбҹ„бһҡбһ– бһ“бһ·бһ„бһҖбҹ’бһҸбһёбһҹбһ„бҹ’бһғбһ№бһҳ</h1>
    <button class="btn-primary" onclick="showMessage()">бһҹбһ»бһҒбһ‘бһ»бһҖбҹ’бһҒбһҡбһ”бһҹбҹӢбһҹбһ·бһҹбҹ’бһҹ</button>
  </div>

  <div id="screen-msg">
    <img style="width: 180px; margin-bottom: 15px;" src="https://i.pinimg.com/originals/ec/2e/c8/ec2ec8760d3743c03ca308c79e93a6b5.gif">
    <div class="msg-card">
        <div id="msg-container" class="khmer-msg"></div>
    </div>
    <button class="back-btn" onclick="goBack()">бһҸбҹ’бһҡбһЎбһ”бҹӢбһҖбҹ’бһҡбҹ„бһҷ</button>
  </div>
</div>

<script>
  const FULL_MSG = "бһҮбһҳбҹ’бһҡбһ¶бһ”бһҹбһҪбһҡбһӣбҹ„бһҖбһӮбҹ’бһҡбһјбһҮбһ¶бһ‘бһёбһӮбҹ„бһҡбһ–бһҠбҹҸбһҒбҹ’бһ–бһ„бҹӢбһҒбҹ’бһ–бһҹбҹӢ! бһҹбһјбһҳбһӮбҹ„бһҡбһ–бһҹбҹ’бһ“бһҫбһҹбһ»бҹҶбһӣбҹ„бһҖбһӮбҹ’бһҡбһјбһҳбҹҒбһҸбҹ’бһҸбһ¶бһ•бҹ’бһҸбһӣбҹӢбһ“бһјбһңбһңбһ·бһүбҹ’бһүбһ¶бһҹбһ¶бһҡбҹҶбһӣбһ№бһҖбһҳбҹҒбһҡбҹҖбһ“ бһҠбһҫбһҳбҹ’бһ”бһёбһұбҹ’бһҷбһ–бһҪбһҖбһҷбһҫбһ„бһҸбҹ’бһҡбҹҖбһҳбһҒбҹ’бһӣбһҪбһ“бһ”бһ¶бһ“бһӣбҹ’бһўбһ”бҹ’бһҡбһҹбһҫбһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ·бһ…бҹ’бһ…бһҖбһ¶бһҡбһ”бҹ’бһҡбһЎбһ„бһҒбһ¶бһ„бһҳбһ»бһҒбһ“бҹҒбҹҮбҹ” бһҹбһјбһҳбһўбһҡбһӮбһ»бһҺбһӣбҹ„бһҖбһӮбҹ’бһҡбһј рҹҷҸ";

  function showMessage() {
    document.getElementById('screen-start').style.display = 'none';
    const s2 = document.getElementById('screen-msg');
    const container = document.getElementById('msg-container');
    s2.classList.add('active');
    
    // On iPhone, splitting Khmer by character causes the "broken alphabet" error.
    // Instead, we display the text whole or by word to keep clusters together.
    container.textContent = FULL_MSG;
    
    // Add small delay to trigger smooth fade in instead of letter-by-letter to avoid errors
    setTimeout(() => {
        container.classList.add('visible');
    }, 100);
  }

  function goBack() {
    location.reload(); 
  }
</script>

</body>
</html>
