<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>рҹҷҸ бһҹбҹҶбһҺбһјбһҳбһ–бһҡбһҸбҹ’бһҡбҹҖбһҳбһ”бҹ’бһҡбһЎбһ„</title>
<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&family=Moul&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0a;
    --accent: #ffffff;
    --glass: rgba(255, 255, 255, 0.07);
    --border: rgba(255, 255, 255, 0.15);
    --text-main: #f0f0f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-color: var(--bg);
    color: var(--text-main);
    font-family: 'Kantumruy Pro', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 90%;
    max-width: 500px;
    text-align: center;
  }

  /* GIF Styling */
  .cute-gif {
    width: 100%;
    max-width: 160px;
    height: auto;
    margin-bottom: 20px;
    border-radius: 20px;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
    display: block;
    object-fit: cover;
  }

  /* Screen 1: The Button */
  #screen-start {
    animation: fadeIn 1s ease-out;
  }

  .main-title {
    font-family: 'Moul', serif;
    font-size: 1.8rem;
    margin-bottom: 2.5rem;
    line-height: 1.6;
    color: #ffffff;
  }

  .btn-primary {
    background: #ffffff;
    color: #000000;
    border: none;
    padding: 1.2rem 2.8rem;
    font-size: 1.4rem;
    font-family: 'Kantumruy Pro', sans-serif;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 10px 20px rgba(255,255,255,0.1);
  }

  .btn-primary:hover {
    transform: scale(1.1);
    background: #fdfdfd;
    box-shadow: 0 15px 30px rgba(255,255,255,0.2);
  }

  /* Screen 2: The Message */
  #screen-msg {
    display: none;
    flex-direction: column;
    align-items: center;
  }

  #screen-msg.active { 
    display: flex; 
    animation: slideUp 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards; 
  }

  .msg-card {
    background: var(--glass);
    border: 1px solid var(--border);
    padding: 2.2rem;
    border-radius: 28px;
    line-height: 2.2;
    font-size: 1.2rem;
    text-align: left;
    backdrop-filter: blur(15px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    position: relative;
  }

  .char {
    display: inline;
    opacity: 0;
    animation: reveal 0.04s forwards;
  }

  .back-btn {
    margin-top: 2rem;
    background: transparent;
    border: none;
    color: #888;
    font-size: 1rem;
    cursor: pointer;
    text-decoration: underline;
    transition: color 0.3s;
  }
  
  .back-btn:hover { color: #fff; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { 
    from { opacity: 0; transform: translateY(40px); } 
    to { opacity: 1; transform: translateY(0); } 
  }
  @keyframes reveal { to { opacity: 1; } }
</style>
</head>
<body>

<div id="app">
  <div id="screen-start">
 
    
    <h1 class="main-title">бһӣбҹ„бһҖбһӮбҹ’бһҡбһјбһҮбһ¶бһ‘бһёбһӮбҹ„бһҡбһ– бһ“бһ·бһ„бһҖбҹ’бһҸбһёбһҹбһ„бҹ’бһғбһ№бһҳ</h1>
    <button class="btn-primary" onclick="showMessage()">
      бһҹбһ»бһҒбһ‘бһ»бһҖбҹ’бһҒбһҡбһ”бһҹбҹӢбһҹбһ·бһҹбҹ’бһҹ
    </button>
  </div>

  <div id="screen-msg">
    <img 
  style=" width: 200px;"
    src="https://i.pinimg.com/originals/ec/2e/c8/ec2ec8760d3743c03ca308c79e93a6b5.gif" alt="Back GIF">
    
    <div class="msg-card" id="msg-container">
      </div>
    <button class="back-btn" onclick="goBack()">бһҸбҹ’бһҡбһЎбһ”бҹӢбһҖбҹ’бһҡбҹ„бһҷ</button>
  </div>
</div>

<script>
  // Very polite Khmer text
  const FULL_MSG = "бһҮбһҳбҹ’бһҡбһ¶бһ”бһҹбһҪбһҡбһӣбҹ„бһҖбһӮбҹ’бһҡбһјбһҮбһ¶бһ‘бһёбһӮбҹ„бһҡбһ–бһҠбҹҸбһҒбҹ’бһ–бһ„бҹӢбһҒбҹ’бһ–бһҹбҹӢ! бһҹбһјбһҳбһӮбҹ„бһҡбһ–бһҹбҹ’бһ“бһҫбһҹбһ»бҹҶбһӣбҹ„бһҖбһӮбҹ’бһҡбһјбһҳбҹҒбһҸбҹ’бһҸбһ¶бһ•бҹ’бһҸбһӣбҹӢбһ“бһјбһңбһңбһ·бһүбҹ’бһүбһ¶бһҹбһ¶бһҡбҹҶбһӣбһ№бһҖбһҳбҹҒбһҡбҹҖбһ“ бһҠбһҫбһҳбҹ’бһ”бһёбһұбҹ’бһҷбһ–бһҪбһҖбһҷбһҫбһ„бһҸбҹ’бһҡбҹҖбһҳбһҒбҹ’бһӣбһҪбһ“бһ”бһ¶бһ“бһӣбҹ’бһўбһ”бҹ’бһҡбһҹбһҫбһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ·бһ…бҹ’бһ…бһҖбһ¶бһҡбһ”бҹ’бһҡбһЎбһ„бһҒбһ¶бһ„бһҳбһ»бһҒбһ“бҹҒбҹҮбҹ” бһҹбһјбһҳбһўбһҡбһӮбһ»бһҺбһӣбҹ„бһҖбһӮбҹ’бһҡбһј рҹҷҸ";

  function showMessage() {
    // Hide first screen
    document.getElementById('screen-start').style.display = 'none';
    
    // Show second screen
    const s2 = document.getElementById('screen-msg');
    const container = document.getElementById('msg-container');
    s2.classList.add('active');
    
    // Clear container
    container.innerHTML = '';

    // Create typing effect
    [...FULL_MSG].forEach((char, i) => {
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = char;
      span.style.animationDelay = `${i * 20}ms`;
      container.appendChild(span);
    });
  }

  function goBack() {
    location.reload(); 
  }
</script>

</body>
</html>
